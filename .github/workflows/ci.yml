name: CI Pipeline

# runs on every push and PR to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      # 1. checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. set up python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. cache pip dependencies
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 bandit radon pytest pytest-cov

      # GATE 1: linting
      - name: Gate 1 — Lint with flake8
        run: |
          flake8 src/ --count --statistics

      # GATE 2: security
      - name: Gate 2 — Security scan with bandit
        run: |
          bandit -r src/ -ll

      # GATE 3: complexity
      - name: Gate 3 — Complexity check with radon
        run: python scripts/check_complexity.py

      # GATE 4: tests + coverage
      - name: Gate 4 — Tests with pytest
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          pytest --cov=src --cov-fail-under=70 --cov-report=xml

      # upload coverage report
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false   # don't fail CI if Codecov is down